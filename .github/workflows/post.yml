name: Bot
on:
  schedule:
    - cron: '0 4 * * *'
    - cron: '0 9 * * *'
    - cron: '0 18 * * *'
  workflow_dispatch:
jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - run: python bot.py
